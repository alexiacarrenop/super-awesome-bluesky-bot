name: Run Bluesky Bot

on:
  schedule:
    # This tells GitHub to run your script every single day at 10:30 AM UTC
    - cron: '30 10 * * *'
  workflow_dispatch: # Added the missing colon here

jobs:
  post-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5 
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto

      - name: Run the script
        run: python main.py 